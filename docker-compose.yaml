version: "3.9"

x-airflow-common: &airflow-common
  build: ./airflow   # 🔴 your custom Dockerfile (with Spark)
  networks:
  - airflow-spark-network
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__STORE_SERIALIZED_DAGS: "true"

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__WEBSERVER__SECRET_KEY: 'secret'

    # Optional but useful
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./ingestion:/opt/airflow/ingestion
    - ./spark/jobs:/opt/airflow/spark_jobs
    - /var/run/docker.sock:/var/run/docker.sock

  depends_on:
    postgres:
      condition: service_healthy

  user: "50000:50000"
  group_add:
    - "137" # Replace it with the GID of the host's docker group

services:

  # -----------------------
  # Jupyter
  # -----------------------
  jupyter:
    container_name: jupyter
    build: ./jupyter_notebook
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data

  # -----------------------
  # Postgres (Airflow DB)
  # -----------------------
  postgres:
    image: postgres:13
    networks:
      - airflow-spark-network
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  # -----------------------
  # Airflow Init
  # -----------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create \
        --username admin \
        --password admin \
        --firstname admin \
        --lastname admin \
        --role Admin \
        --email admin@example.com
      "

  # -----------------------
  # Airflow Webserver
  # -----------------------
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # -----------------------
  # Airflow Scheduler
  # -----------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # -----------------------
  # MinIO (S3)
  # -----------------------
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    networks:
      - airflow-spark-network
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # -------------------------
  # SPARK MASTER
  # -------------------------
  # Spark Master
  spark-master:
    build: ./spark
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8088"]
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8088
    ports:
      - "7077:7077"  # Spark Master port
      - "8088:8088"  # Spark Master Web UI (avoiding 8080 which Airflow uses)
    volumes:
      - ./spark/jobs:/opt/spark-jobs
      - ./spark/logs:/opt/spark/logs
    networks:
      - airflow-spark-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------
  # SPARK WORKER
  # -------------------------
  spark-worker:
    build: ./spark
    container_name: spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_PORT: 8881
      SPARK_WORKER_WEBUI_PORT: 8089
    ports:
      - "8089:8089"  # Spark Worker Web UI
    volumes:
      - ./spark/jobs:/opt/spark-jobs
      - ./spark/logs:/opt/spark/logs
    networks:
      - airflow-spark-network

volumes:
  postgres-db-volume:
  minio-data:

networks:
  airflow-spark-network: